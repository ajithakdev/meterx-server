name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check server
        run: cd packages/server && npx tsc --noEmit

      - name: Type check extension
        run: cd packages/extension && npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test server
        run: npm run test

  build-extension:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: cd packages/extension/dist && zip -r ../../../meterx-extension.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meterx-extension
          path: meterx-extension.zip
