<!DOCTYPE html>
<html lang="en">
<head>
    <title>MeterX</title>
    <link rel="stylesheet" href="popup.css">
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="brand">
                <span class="logo">M</span>
                <span class="brand-name">MeterX</span>
            </div>
            <div class="header-right">
                <div id="quality-badge" class="badge hidden" aria-live="polite"></div>
            </div>
        </header>

        <!-- Speed Display — compact horizontal -->
        <div class="speed-display">
            <div class="speed-main" id="heroSection">
                <div class="speed-number" id="heroSpeed">--</div>
                <div class="speed-meta">
                    <span class="speed-unit">Mbps</span>
                    <span class="speed-label" id="heroLabel">download</span>
                </div>
            </div>
            <!-- Mini bars -->
            <div class="speed-bars">
                <div class="bar-row">
                    <span class="bar-icon dl-icon"></span>
                    <div class="bar-track"><div class="bar-fill dl-fill" id="dlBar"></div></div>
                    <span class="bar-val" id="downloadSpeed">--</span>
                </div>
                <div class="bar-row">
                    <span class="bar-icon ul-icon"></span>
                    <div class="bar-track"><div class="bar-fill ul-fill" id="ulBar"></div></div>
                    <span class="bar-val" id="uploadSpeed">--</span>
                </div>
            </div>
        </div>

        <!-- Progress Steps -->
        <div id="progress-bar" class="steps hidden" role="progressbar" aria-label="Test progress">
            <div class="step" id="seg-download"><span class="step-dot"></span>DL</div>
            <div class="step-line"></div>
            <div class="step" id="seg-upload"><span class="step-dot"></span>UL</div>
            <div class="step-line"></div>
            <div class="step" id="seg-ping"><span class="step-dot"></span>Ping</div>
        </div>

        <!-- Stats — compact row -->
        <div class="stats">
            <div class="stat-item">
                <span class="stat-val" id="ping">--</span>
                <span class="stat-lbl">Ping <span class="stat-u">ms</span></span>
            </div>
            <div class="stat-sep"></div>
            <div class="stat-item">
                <span class="stat-val" id="jitter">--</span>
                <span class="stat-lbl">Jitter <span class="stat-u">ms</span></span>
            </div>
            <div class="stat-sep"></div>
            <div class="stat-item">
                <span class="stat-val" id="packetLoss">--</span>
                <span class="stat-lbl">Loss <span class="stat-u">%</span></span>
            </div>
        </div>

        <!-- Status + Action -->
        <div class="action-area">
            <p id="status" aria-live="polite">Ready to test</p>
            <div class="action-row">
                <button id="startButton" aria-label="Start speed test">
                    <span class="btn-text">Start Test</span>
                    <span class="btn-spinner hidden" id="btnSpinner"></span>
                </button>
                <button id="cancelButton" class="cancel-btn hidden" aria-label="Cancel">Stop</button>
            </div>
        </div>

        <!-- History -->
        <div class="history-section" id="historySection">
            <button id="historyToggle" class="ghost-btn" aria-label="Toggle test history">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span id="historyLabel">History</span>
            </button>
            <div id="historyList" class="history-list hidden"></div>
        </div>

        <!-- Footer -->
        <footer>
            <span>MeterX v2026.0.319</span>
            <span class="dot"></span>
            <a href="https://github.com/ajithakdev" class="footer-link">ajithakdev</a>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
