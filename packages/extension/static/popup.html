<!DOCTYPE html>
<html lang="en">
<head>
    <title>MeterX</title>
    <link rel="stylesheet" href="popup.css">
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="brand">
                <span class="logo">M</span>
                <span class="brand-name">MeterX</span>
            </div>
            <div id="quality-badge" class="badge hidden" aria-live="polite"></div>
        </header>

        <!-- Central Gauge -->
        <div class="hero-gauge">
            <svg class="ring-gauge" viewBox="0 0 200 200">
                <circle class="ring-bg" cx="100" cy="100" r="85" />
                <circle class="ring-fill download-ring" id="downloadRing" cx="100" cy="100" r="85" />
                <circle class="ring-fill upload-ring" id="uploadRing" cx="100" cy="100" r="78" />
            </svg>
            <div class="hero-center">
                <div class="hero-speed" id="heroSpeed">--</div>
                <div class="hero-unit">Mbps</div>
                <div class="hero-label" id="heroLabel">download</div>
            </div>
        </div>

        <!-- Progress Steps -->
        <div id="progress-bar" class="steps hidden" role="progressbar" aria-label="Test progress">
            <div class="step" id="seg-download"><span class="step-dot"></span>Download</div>
            <div class="step-line"></div>
            <div class="step" id="seg-upload"><span class="step-dot"></span>Upload</div>
            <div class="step-line"></div>
            <div class="step" id="seg-ping"><span class="step-dot"></span>Ping</div>
        </div>

        <!-- Metrics Grid -->
        <div class="metrics">
            <div class="metric">
                <span class="metric-label">Download</span>
                <span class="metric-value" id="downloadSpeed">--</span>
                <span class="metric-unit">Mbps</span>
            </div>
            <div class="metric">
                <span class="metric-label">Upload</span>
                <span class="metric-value" id="uploadSpeed">--</span>
                <span class="metric-unit">Mbps</span>
            </div>
            <div class="metric">
                <span class="metric-label">Ping</span>
                <span class="metric-value" id="ping">--</span>
                <span class="metric-unit">ms</span>
            </div>
            <div class="metric">
                <span class="metric-label">Jitter</span>
                <span class="metric-value" id="jitter">--</span>
                <span class="metric-unit">ms</span>
            </div>
            <div class="metric">
                <span class="metric-label">Loss</span>
                <span class="metric-value" id="packetLoss">--</span>
                <span class="metric-unit">%</span>
            </div>
        </div>

        <!-- Status -->
        <div id="status-container" aria-live="polite">
            <p id="status">Ready to test</p>
        </div>

        <!-- Action -->
        <div class="action-row">
            <button id="startButton" aria-label="Start speed test">
                <span class="btn-text">Start Test</span>
                <span class="btn-spinner hidden" id="btnSpinner"></span>
            </button>
            <button id="cancelButton" class="cancel-btn hidden" aria-label="Cancel speed test">Stop</button>
        </div>

        <!-- History -->
        <div class="history-section">
            <button id="historyToggle" class="ghost-btn" aria-label="Show test history">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                History
            </button>
            <div id="historyList" class="history-list hidden"></div>
        </div>

        <!-- Footer -->
        <footer>
            <span>MeterX v2026.0.319</span>
            <span class="dot"></span>
            <a href="https://github.com/ajithakdev" class="footer-link">ajithakdev</a>
            <span class="dot"></span>
            <span>MIT</span>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
