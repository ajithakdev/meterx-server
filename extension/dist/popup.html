<!DOCTYPE html>
<html>
<head>
    <title>MeterX</title>
    <meta charset="UTF-8">
  <script type="module" crossorigin src="popup-1TnP3lWm.js"></script>
  <link rel="stylesheet" crossorigin href="popup-ufdASQaR.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>MeterX <span class="rocket">🚀</span></h1>
            <div class="alien-doodle">👽</div>
        </header>
        <main>
            <div id="results">
                <p>Download: <span id="downloadSpeed">-</span> Mbps</p>
                <p>Upload: <span id="uploadSpeed">-</span> Mbps</p>
                <p>Ping: <span id="ping">-</span> ms</p>
                <p>Jitter: <span id="jitter">-</span> ms</p>
            </div>
            <div id="history-container" style="margin-top:15px;">
                <h3 style="font-size:15px;margin-bottom:5px;">Test History</h3>
                <ul id="historyList" style="font-size:13px;max-height:100px;overflow-y:auto;padding-left:15px;"></ul>
            </div>
            <div id="status-container">
                <p id="status">Click Start to measure!</p>
                <div style="margin-top:10px;">
                    <label for="fileSizeSelect" style="display:block;font-weight:500;">Test file size:</label>
                    <select id="fileSizeSelect" style="width:100%;margin-bottom:10px;border-radius:6px;padding:6px 10px;background:#232a3a;color:#82eefd;font-size:15px;">
                        <option value="1">1 MB</option>
                        <option value="10">10 MB</option>
                        <option value="25">25 MB</option>
                    </select>
                </div>
                <div style="margin-bottom:10px;">
                    <span style="font-size:13px;color:#82eefd;font-weight:500;">Server:</span>
                    <span style="font-size:13px;color:#fff;">https://meterx-speedtest-server.onrender.com</span>
                </div>
            </div>
            <button id="startButton">Start Test</button>
            <div id="loading-indicator" class="hidden">
                <div class="spinner"></div>
                <p>Testing in progress...</p>
            </div>
        </main>
        <footer>
            <p class="glitch-effect">Powered by I-I-C</p>
        </footer>
    </div>
</body>
</html>
