<!DOCTYPE html>
<html>
<head>
    <title>NetPulse Pro</title>

    <meta charset="UTF-8">
  <script type="module" crossorigin src="popup-Do0Y7Jcp.js"></script>
  <link rel="stylesheet" crossorigin href="popup-D8Mc2R5N.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>NetPulse Pro <span class="rocket">🚀</span></h1>
            <div class="alien-doodle">👽</div>
        </header>
        <main>
            <div id="results">
                <p>Download: <span id="downloadSpeed">-</span> Mbps</p>
                <p>Upload: <span id="uploadSpeed">-</span> Mbps</p>
                <p>Ping: <span id="ping">-</span> ms</p>
                <p>Jitter: <span id="jitter">-</span> ms</p>
            </div>
            
            <div id="test-controls">
                <p id="status">Click Start to measure!</p>
                <div class="file-size-selector">
                    <label for="fileSizeSelect">Test file size:</label>
                    <select id="fileSizeSelect">
                        <option value="1">1 MB</option>
                        <option value="10">10 MB</option>
                        <option value="25">25 MB</option>
                    </select>
                </div>
                <button id="startButton">Start Test</button>
                <div id="loading-indicator" class="hidden">
                    <div class="spinner"></div>
                    <p>Testing in progress...</p>
                </div>
            </div>
            
            <div id="history-container">
                <div class="history-header">
                    <h3>Test History</h3>
                </div>
                <div class="history-scroll-container">
                    <ul id="historyList"></ul>
                </div>
            </div>
        </main>
        <footer>
            <p class="glitch-effect">Powered by IIC</p>
        </footer>
    </div>

</body>
</html>
