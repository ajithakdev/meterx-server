<!DOCTYPE html>
<html>
<head>
    <title>NetPulse Pro</title>
    <link rel="stylesheet" href="popup.css">
    <meta charset="UTF-8">
</head>
<body>
    <div class="container">
        <header>
            <h1>NetPulse Pro <span class="rocket">🚀</span></h1>
            <div class="alien-doodle">👽</div>
        </header>
        <main>
            <div id="results">
                <p>Download: <span id="downloadSpeed">-</span> Mbps <span class="mini-spinner download-spinner hidden"></span></p>
                <p>Upload: <span id="uploadSpeed">-</span> Mbps <span class="mini-spinner upload-spinner hidden"></span></p>
                <p>Ping: <span id="ping">-</span> ms <span class="mini-spinner ping-spinner hidden"></span></p>
                <p>Jitter: <span id="jitter">-</span> ms <span class="mini-spinner jitter-spinner hidden"></span></p>
            </div>
            
            <div id="test-controls">
                <p id="status">Click Start to measure!</p>
                <div class="file-size-selector">
                    <label for="fileSizeSelect">Test file size:</label>
                    <select id="fileSizeSelect">
                        <option value="1">1 MB</option>
                        <option value="10">10 MB</option>
                        <option value="25">25 MB</option>
                    </select>
                </div>
                <button id="startButton">Start Test</button>
            </div>
            
            <div id="history-container">
                <div class="history-header">
                    <h3>Test History</h3>
                </div>
                <div class="history-scroll-container">
                    <ul id="historyList"></ul>
                </div>
            </div>
        </main>
        <footer>
            <p class="glitch-effect">Powered by IIC</p>
        </footer>
    </div>
    <script type="module" src="popup.ts"></script>
</body>
</html>
